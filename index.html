Ты получаешь транскрибацию телефонного разговора и анализируешь её по восьми критериям.

Критерии (каждый 0-10):
3.1 Качество коммуникации (10%): приветствие, вежливость, слушание, грамотность
3.2 Установление контакта (15%): ведёт разговор, инициатива, доверие, завершение

3.5 Работа с возражениями (15%): слушает, присоединение→аргумент→вопрос, не давит, дата контакта

// ═══ API HELPERS ═══
async function bx(method,params={}){
  const url=new URL(`${BX}/${method}`);
  const flat=(obj,pfx='')=>{Object.entries(obj).forEach(([k,v])=>{const key=pfx?`${pfx}[${k}]`:k;if(v&&typeof v==='object'&&!Array.isArray(v))flat(v,key);else url.searchParams.append(key,v)})};
  flat(params);const r=await fetch(url);if(!r.ok)throw new Error(`Bitrix ${r.status}`);return r.json();
}

async function groqTranscribe(b64,mime){
  const bytes=atob(b64);const arr=new Uint8Array(bytes.length);for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
  const blob=new Blob([arr],{type:mime});
  const ext={'audio/mpeg':'mp3','audio/wav':'wav','audio/ogg':'ogg','audio/flac':'flac','audio/mp4':'m4a'}[mime]||'mp3';
  const fd=new FormData();fd.append('file',blob,`rec.${ext}`);fd.append('model','whisper-large-v3');fd.append('language','ru');
  const r=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{method:'POST',headers:{'Authorization':`Bearer ${GROQ}`},body:fd});
  const d=await r.json();if(d.error)throw new Error('Whisper: '+(d.error.message||JSON.stringify(d.error)));
  return d.text||'';
}

async function groqChat(userMsg,sysMsg){
  const msgs=[];if(sysMsg)msgs.push({role:'system',content:sysMsg});msgs.push({role:'user',content:userMsg});
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ}`},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:msgs,max_tokens:8000,temperature:0.3})});
  const d=await r.json();if(d.error)throw new Error('LLM: '+(d.error.message||JSON.stringify(d.error)));
  return d.choices?.[0]?.message?.content||'';
}

// ═══ HELPERS ═══
function fmtDur(s){if(!s)return"0:00";return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`}
function fmtDT(d){if(!d)return"—";return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function fmtDate(d){if(!d)return"—";return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})}
function sColor(s){return s>=8.5?'#059669':s>=6.5?'#d97706':s>=4?'#ea580c':'#dc2626'}
function sLabel(s){return s>=8.5?'Отлично':s>=6.5?'Хорошо':s>=4?'Удовлетв.':'Плохо'}
function weekNum(d){const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-((dt.getDay()+6)%7));const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt-w1)/864e5-3+((w1.getDay()+6)%7))/7)}
const LS='mavis_analyses_v2';
function loadA(){try{return JSON.parse(localStorage.getItem(LS)||'[]')}catch{return[]}}
function saveA(a){localStorage.setItem(LS,JSON.stringify(a))}

// ═══ COMPONENTS ═══
function Badge({score,size='md'}){
  const c=sColor(score);const s={sm:{w:32,h:32,f:11},md:{w:44,h:44,f:14},lg:{w:58,h:58,f:20}}[size];
  return <div style={{width:s.w,height:s.h,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:c+'12',border:`2.5px solid ${c}`,color:c,fontSize:s.f,fontWeight:700,flexShrink:0}} className="mono">{score?.toFixed(1)??"—"}</div>;
}

function CriteriaBar({criteria}){

      <div style={{height:'100%',width:`${(c.score/10)*100}%`,background:sColor(c.score),borderRadius:5,transition:'width .5s'}}/>
      <span style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',fontSize:10,fontWeight:700,color:'#374151'}} className="mono">{c.score}</span>
    </div>
    <div style={{width:32,fontSize:10,color:'#9ca3af',textAlign:'center'}}>{c.weight}%</div>

function TranscriptModal({text,onClose}){
  if(!text)return null;
  // Parse lines and colorize roles
  const lines=text.split('\n').filter(l=>l.trim());
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:1001,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
    <div style={{background:'#fff',borderRadius:16,maxWidth:700,width:'100%',maxHeight:'85vh',overflow:'auto',padding:28,animation:'slideUp .3s'}} onClick={e=>e.stopPropagation()}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
        <h3 style={{fontSize:16,fontWeight:700}}>Транскрибация звонка</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#9ca3af'}}>✕</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {lines.map((line,i)=>{
          const colonIdx=line.indexOf(':');
          if(colonIdx>0&&colonIdx<40){
            const speaker=line.substring(0,colonIdx).trim();
            const msg=line.substring(colonIdx+1).trim();
            const isManager=STAFF.some(s=>speaker.includes(s.name.split(' ').pop()));
            return <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start'}}>

                background:isManager?'#dbeafe':'#fef3c7',color:isManager?'#1e40af':'#92400e',minWidth:60,textAlign:'center'
              }}>{speaker}</div>
              <div style={{fontSize:13,color:'#374151',lineHeight:1.6}}>{msg}</div>
            </div>;
          }
          return <div key={i} style={{fontSize:13,color:'#6b7280',lineHeight:1.6,paddingLeft:8}}>{line}</div>;
        })}
      </div>
    </div>
  </div>;
}

// ═══ MAIN APP ═══
function App(){
  const[tab,setTab]=useState('calls');
  const[calls,setCalls]=useState([]);
  const[analyses,setAnalyses]=useState(()=>loadA());
  const[loadingCalls,setLoadingCalls]=useState(false);
  const[error,setError]=useState(null);
  const[selEmp,setSelEmp]=useState('all');
  const[dateFrom,setDateFrom]=useState(()=>{const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().slice(0,10)});
  const[dateTo,setDateTo]=useState(()=>new Date().toISOString().slice(0,10));
  const[period,setPeriod]=useState('week');
  const[analyzing,setAnalyzing]=useState(null);
  const[selAnalysis,setSelAnalysis]=useState(null);
  const[showTranscript,setShowTranscript]=useState(null);
  const[progress,setProgress]=useState('');
  const[batchRunning,setBatchRunning]=useState(false);
  const[batchProgress,setBatchProgress]=useState('');
  const[batchDone,setBatchDone]=useState(0);
  const[batchTotal,setBatchTotal]=useState(0);
  const batchStop=useRef(false);

  useEffect(()=>{saveA(analyses)},[analyses]);

  // ── Load calls ──
  const loadCalls=useCallback(async()=>{
    setLoadingCalls(true);setError(null);
    try{
      const params={FILTER:{'>CALL_START_DATE':`${dateFrom}T00:00:00`,'<CALL_START_DATE':`${dateTo}T23:59:59`},SORT:'CALL_START_DATE',ORDER:'DESC',LIMIT:50};
      if(selEmp!=='all')params.FILTER.PORTAL_USER_ID=selEmp;
      const res=await bx('voximplant.statistic.get',params);
      setCalls((res.result||[]).map(c=>({
        id:c.ID,date:c.CALL_START_DATE,duration:parseInt(c.CALL_DURATION)||0,
        empId:c.PORTAL_USER_ID,empName:STAFF.find(s=>s.id===c.PORTAL_USER_ID)?.name||`#${c.PORTAL_USER_ID}`,
        type:c.CALL_TYPE==1?'Исходящий':c.CALL_TYPE==2?'Входящий':'Внутренний',
        phone:c.PHONE_NUMBER,recordFileId:c.RECORD_FILE_ID||null,
        recordUrl:c.RECORD_URL||c.CALL_RECORD_URL||null,
        crmType:c.CRM_ENTITY_TYPE,crmId:c.CRM_ENTITY_ID
      })));
    }catch(e){setError(`Ошибка: ${e.message}`)}
    setLoadingCalls(false);
  },[dateFrom,dateTo,selEmp]);

  // ── Single call analysis ──
  async function doAnalyze(call, progressCb){
    if(progressCb) progressCb('Получение ссылки на запись...');
    let downloadUrl=call.recordUrl,fileName='';
    if(!downloadUrl&&call.recordFileId){
      const fi=await bx('disk.file.get',{id:call.recordFileId});
      if(fi.result?.DOWNLOAD_URL){downloadUrl=fi.result.DOWNLOAD_URL;fileName=fi.result.NAME||''}
    }
    if(!downloadUrl)throw new Error('Нет записи');

    // Get CRM contact/lead name
    if(progressCb) progressCb('Загрузка информации о клиенте...');
    let clientName='Клиент', clientCompany='';
    try{
      if(call.crmType==='CONTACT'&&call.crmId){
        const cr=await bx('crm.contact.get',{id:call.crmId});
        if(cr.result){clientName=`${cr.result.NAME||''} ${cr.result.LAST_NAME||''}`.trim()||'Клиент';
          if(cr.result.COMPANY_ID){try{const co=await bx('crm.company.get',{id:cr.result.COMPANY_ID});clientCompany=co.result?.TITLE||''}catch{}}
        }
      }else if(call.crmType==='LEAD'&&call.crmId){
        const lr=await bx('crm.lead.get',{id:call.crmId});
        if(lr.result){clientName=`${lr.result.NAME||''} ${lr.result.LAST_NAME||''}`.trim()||'Клиент';clientCompany=lr.result.COMPANY_TITLE||''}
      }
    }catch{}
    const clientLabel=clientCompany?`${clientName} (${clientCompany})`:clientName;

    if(progressCb) progressCb('Загрузка аудио...');
    const audioResp=await fetch(downloadUrl);
    if(!audioResp.ok)throw new Error(`Загрузка: ${audioResp.status}`);
    const blob=await audioResp.blob();
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(blob)});

    let mime='audio/mpeg';const fn=(fileName||downloadUrl||'').toLowerCase();
    if(fn.includes('.wav'))mime='audio/wav';else if(fn.includes('.ogg'))mime='audio/ogg';

    if(progressCb) progressCb('Транскрибация аудио...');
    const rawTranscription=await groqTranscribe(b64,mime);
    if(rawTranscription.length<20)throw new Error('Транскрибация пустая');

    // Wait to avoid rate limiting
    await new Promise(r=>setTimeout(r,2000));

    // Reformat transcript with roles
    if(progressCb) progressCb('Разметка по ролям...');
    const managerFirstName=call.empName.split(' ').pop()||call.empName;
    const transcription=await groqChat(
      `Вот транскрибация телефонного звонка между менеджером "${managerFirstName}" и клиентом "${clientLabel}".
Раздели текст по ролям. Определи кто менеджер, кто клиент по контексту разговора (менеджер представляется от компании Мавис Групп, предлагает услуги).
Формат ответа — ТОЛЬКО размеченный диалог, без пояснений:

${managerFirstName}: текст реплики менеджера
${clientLabel}: текст реплики клиента

Вот транскрибация:
${rawTranscription}`,
      'Ты размечаешь транскрибации звонков по ролям. Отвечай ТОЛЬКО размеченным диалогом, без пояснений и комментариев.'
    );

    await new Promise(r=>setTimeout(r,2000));

    if(progressCb) progressCb('Анализ по критериям...');
    const anText=await groqChat(
      `Проанализируй транскрибацию звонка.\nДата: ${fmtDT(call.date)}\nМенеджер: ${call.empName}\nКлиент: ${clientLabel}\n\n---\n${transcription}\n---`,SYS
    );
    const m=anText.match(/\{[\s\S]*\}/);
    const parsed=JSON.parse(m?m[0]:anText);

    return{
      id:`${call.id}_${Date.now()}`,callId:call.id,callDate:call.date,
      duration:call.duration,managerId:call.empId,managerName:call.empName,
      phone:call.phone,type:call.type,transcription,result:parsed,
      analyzedAt:new Date().toISOString()
    };
  }

  const analyzeCall=useCallback(async(call)=>{
    setAnalyzing(call.id);setError(null);
    try{
      const result=await doAnalyze(call, msg=>setProgress(msg));
      setAnalyses(prev=>[result,...prev]);
    }catch(e){setError(e.message)}
    setProgress('');setAnalyzing(null);
  },[]);

  // ── Batch analysis ──
  const runBatch=useCallback(async()=>{
    if(batchRunning)return;
    batchStop.current=false;setBatchRunning(true);setError(null);
    try{
      setBatchProgress('Загрузка звонков...');
      const params={FILTER:{'>CALL_START_DATE':`${dateFrom}T00:00:00`,'<CALL_START_DATE':`${dateTo}T23:59:59`,'>CALL_DURATION':'30'},SORT:'CALL_START_DATE',ORDER:'DESC',LIMIT:50};
      if(selEmp!=='all')params.FILTER.PORTAL_USER_ID=selEmp;
      const res=await bx('voximplant.statistic.get',params);
      const batchCalls=(res.result||[]).filter(c=>c.RECORD_FILE_ID).map(c=>({
        id:c.ID,date:c.CALL_START_DATE,duration:parseInt(c.CALL_DURATION)||0,
        empId:c.PORTAL_USER_ID,empName:STAFF.find(s=>s.id===c.PORTAL_USER_ID)?.name||`#${c.PORTAL_USER_ID}`,
        type:c.CALL_TYPE==1?'Исходящий':c.CALL_TYPE==2?'Входящий':'Внутренний',
        phone:c.PHONE_NUMBER,recordFileId:c.RECORD_FILE_ID,recordUrl:c.RECORD_URL||c.CALL_RECORD_URL||null,
        crmType:c.CRM_ENTITY_TYPE,crmId:c.CRM_ENTITY_ID
      }));

      // Filter out already analyzed
      const existingIds=new Set(analyses.map(a=>a.callId));
      const todo=batchCalls.filter(c=>!existingIds.has(c.id));

      if(!todo.length){setBatchProgress('');setBatchRunning(false);setError('Все звонки уже проанализированы или нет записей');return}

      setBatchTotal(todo.length);setBatchDone(0);
      for(let i=0;i<todo.length;i++){
        if(batchStop.current)break;
        setBatchProgress(`Анализ ${i+1} из ${todo.length}: ${todo[i].empName} (${fmtDur(todo[i].duration)})...`);
        try{
          const result=await doAnalyze(todo[i]);
          setAnalyses(prev=>[result,...prev]);
          setBatchDone(i+1);
        }catch(e){
          console.error('Batch error:',todo[i].id,e.message);
          // Wait and continue
          await new Promise(r=>setTimeout(r,5000));
        }
        // Rate limit: wait 3s between calls
        if(i<todo.length-1)await new Promise(r=>setTimeout(r,3000));
      }
    }catch(e){setError(e.message)}
    setBatchProgress('');setBatchRunning(false);
  },[dateFrom,dateTo,selEmp,analyses]);

  // ── Report helpers ──
  const getFiltered=()=>analyses.filter(a=>{
    if(selEmp!=='all'&&a.managerId!==selEmp)return false;
    const d=new Date(a.callDate);return d>=new Date(dateFrom)&&d<=new Date(dateTo+'T23:59:59');
  });

  const getMgrStats=(filtered)=>{
    const s={};filtered.forEach(a=>{
      const r=typeof a.result==='string'?JSON.parse(a.result):a.result;
      if(!s[a.managerId])s[a.managerId]={name:a.managerName,total:0,count:0,crit:{}};
      s[a.managerId].total+=r.score;s[a.managerId].count+=1;
      r.criteria.forEach(c=>{if(!s[a.managerId].crit[c.id])s[a.managerId].crit[c.id]={t:0,n:0};s[a.managerId].crit[c.id].t+=c.score;s[a.managerId].crit[c.id].n+=1});
    });return s;
  };

  // ── Nav ──
  const navBtn=(id,icon,label)=><button key={id} onClick={()=>setTab(id)} style={{padding:'9px 16px',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,borderRadius:8,transition:'all .15s',background:tab===id?'#1e3a5f':'transparent',color:tab===id?'#fff':'#6b7280'}}>{icon} {label}</button>;
  const mobileNavBtn=(id,icon,label)=><button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'8px 0',border:'none',cursor:'pointer',fontSize:10,fontWeight:600,display:'flex',flexDirection:'column',alignItems:'center',gap:1,background:'transparent',color:tab===id?'#1e3a5f':'#9ca3af',borderTop:tab===id?'2px solid #1e3a5f':'2px solid transparent'}}><span style={{fontSize:18}}>{icon}</span>{label}</button>;

  return <div style={{minHeight:'100vh',paddingBottom:70}}>
    {/* Header */}
    <div style={{background:'#fff',borderBottom:'1px solid #e5e7eb',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100}}>
      <Logo/>
      <div className="desktop-nav" style={{display:'flex',gap:2,background:'#f3f4f6',borderRadius:10,padding:3}}>
        {navBtn('calls','📞','Звонки')}
        {navBtn('batch','⚡','Пакетный анализ')}
        {navBtn('reports','📊','Отчёты')}
        {navBtn('history','📋','История')}
      </div>
    </div>

    <div style={{padding:'14px 16px 0',maxWidth:1100,margin:'0 auto'}}>
      {error&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'10px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'flex-start',animation:'fadeIn .3s',gap:8}}>
        <span style={{fontSize:12,color:'#dc2626',lineHeight:1.5}}>{error}</span>
        <button onClick={()=>setError(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:14,flexShrink:0}}>✕</button>
      </div>}
      {progress&&<div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:10,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:8,animation:'fadeIn .3s'}}>
        <div className="spinner" style={{color:'#2563eb',width:14,height:14,borderWidth:2}}/><span style={{fontSize:12,color:'#1d4ed8'}}>{progress}</span>
      </div>}

      {/* ═══ CALLS TAB ═══ */}
      {tab==='calls'&&<>
        <div className="card filters-row" style={{padding:16,marginBottom:14,display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:150}}>
            <label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>Сотрудник</label>
            <select value={selEmp} onChange={e=>setSelEmp(e.target.value)}>
              <option value="all">Все</option>
              {STAFF.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>С</label><input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/></div>
          <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>По</label><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/></div>
          <button className="btn btn-primary" onClick={loadCalls} disabled={loadingCalls}>
            {loadingCalls?<><div className="spinner" style={{width:13,height:13,borderWidth:2,color:'#fff'}}/>Загрузка...</>:'Загрузить'}
          </button>
        </div>
        {calls.length>0?<div style={{display:'flex',flexDirection:'column',gap:5}}>
          <div style={{fontSize:11,color:'#6b7280',marginBottom:2,paddingLeft:2}}>Звонков: {calls.length}</div>
          {calls.map(c=>{
            const ex=analyses.find(a=>a.callId===c.id);const busy=analyzing===c.id;const hasRec=c.recordUrl||c.recordFileId;
            return <div key={c.id} className="card call-row" style={{padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,animation:'fadeIn .3s'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0}}>
                <div style={{width:38,height:38,borderRadius:9,background:c.type==='Входящий'?'#dbeafe':'#dcfce7',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{c.type==='Входящий'?'📥':'📤'}</div>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,color:'#111827'}}>{c.empName}</div>
                  <div style={{fontSize:11,color:'#6b7280',marginTop:1}}>{fmtDT(c.date)} • {c.type} • {fmtDur(c.duration)}{c.phone?` • ${c.phone}`:''}</div>
                </div>
              </div>
              <div className="call-actions" style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                {ex&&<div style={{cursor:'pointer',display:'flex',alignItems:'center',gap:5}} onClick={()=>setSelAnalysis(ex)}>
                  <Badge score={(typeof ex.result==='string'?JSON.parse(ex.result):ex.result).score} size="sm"/>
                </div>}
                <button className="btn btn-ghost" onClick={()=>analyzeCall(c)} disabled={busy||!hasRec} style={{fontSize:11,padding:'6px 12px',opacity:busy?.6:!hasRec?.35:1,cursor:busy||!hasRec?'not-allowed':'pointer'}}>
                  {busy?<><div className="spinner" style={{width:11,height:11,borderWidth:2}}/>...</>:!hasRec?'—':ex?'↻':'Анализ'}
                </button>
              </div>
            </div>})}
        </div>:!loadingCalls&&<div style={{textAlign:'center',padding:'50px 20px',color:'#9ca3af'}}>
          <div style={{fontSize:40,marginBottom:8}}>📞</div>
          <div style={{fontSize:14,fontWeight:600,color:'#6b7280'}}>Загрузите звонки</div>
          <div style={{fontSize:12,marginTop:3}}>Выберите период и нажмите «Загрузить»</div>
        </div>}
      </>}

      {/* ═══ BATCH TAB ═══ */}
      {tab==='batch'&&<>
        <div className="card" style={{padding:20,marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,color:'#111827',marginBottom:4}}>⚡ Пакетный анализ</h3>
          <p style={{fontSize:12,color:'#6b7280',marginBottom:16,lineHeight:1.6}}>Автоматически проанализирует все звонки выбранного сотрудника за период. Звонки короче 30 секунд и без записи пропускаются. Между анализами пауза 3 сек для соблюдения лимитов API.</p>
          <div className="filters-row" style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end',marginBottom:16}}>
            <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:150}}>
              <label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>Сотрудник</label>
              <select value={selEmp} onChange={e=>setSelEmp(e.target.value)}>
                <option value="all">Все</option>
                {STAFF.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>С</label><input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>По</label><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/></div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-success" onClick={runBatch} disabled={batchRunning} style={{fontSize:13}}>
              {batchRunning?<><div className="spinner" style={{width:13,height:13,borderWidth:2,color:'#fff'}}/>Анализ...</>:'🚀 Запустить пакетный анализ'}
            </button>
            {batchRunning&&<button className="btn btn-danger" onClick={()=>batchStop.current=true} style={{fontSize:12}}>⏹ Остановить</button>}
          </div>
        </div>
        {batchProgress&&<div style={{background:'#ecfdf5',border:'1px solid #a7f3d0',borderRadius:10,padding:'12px 16px',marginBottom:14,animation:'fadeIn .3s'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:12,color:'#065f46',fontWeight:600}}>{batchProgress}</span>
            {batchTotal>0&&<span className="mono" style={{fontSize:12,color:'#059669'}}>{batchDone}/{batchTotal}</span>}
          </div>
          {batchTotal>0&&<div style={{height:6,background:'#d1fae5',borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${(batchDone/batchTotal)*100}%`,background:'#059669',borderRadius:3,transition:'width .3s'}}/>
          </div>}
        </div>}
      </>}

      {/* ═══ REPORTS TAB ═══ */}
      {tab==='reports'&&(()=>{
        const filtered=getFiltered();const mgrStats=getMgrStats(filtered);
        const avgAll=filtered.length?filtered.reduce((s,a)=>{const r=typeof a.result==='string'?JSON.parse(a.result):a.result;return s+r.score},0)/filtered.length:0;
        return <>
          <div className="card filters-row" style={{padding:16,marginBottom:14,display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>Группировка</label>
              <select value={period} onChange={e=>setPeriod(e.target.value)}><option value="day">По дням</option><option value="week">По неделям</option><option value="month">По месяцам</option></select></div>
            <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:150}}><label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>Сотрудник</label>
              <select value={selEmp} onChange={e=>setSelEmp(e.target.value)}><option value="all">Все</option>{STAFF.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>С</label><input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>По</label><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/></div>
          </div>
          {!filtered.length?<div style={{textAlign:'center',padding:'50px 20px',color:'#9ca3af'}}><div style={{fontSize:40,marginBottom:8}}>📊</div><div style={{fontSize:14,fontWeight:600,color:'#6b7280'}}>Нет данных</div><div style={{fontSize:12,marginTop:3}}>Сначала проанализируйте звонки</div></div>:<>
            <div className="stat-cards" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:8,marginBottom:16}}>
              {[{l:'Анализов',v:filtered.length,c:'#111827'},{l:'Средний балл',v:avgAll.toFixed(1),c:sColor(avgAll)},{l:'Отлично ≥8.5',v:filtered.filter(a=>(typeof a.result==='string'?JSON.parse(a.result):a.result).score>=8.5).length,c:'#059669'},{l:'Внимание <6.5',v:filtered.filter(a=>(typeof a.result==='string'?JSON.parse(a.result):a.result).score<6.5).length,c:'#dc2626'}].map(({l,v,c})=>
              <div key={l} className="card" style={{padding:'14px 16px'}}><div style={{fontSize:10,color:'#6b7280',fontWeight:700,marginBottom:5,textTransform:'uppercase',letterSpacing:'.05em'}}>{l}</div><div className="mono" style={{fontSize:26,fontWeight:700,color:c}}>{v}</div></div>)}
            </div>
            <div className="card" style={{padding:18,marginBottom:16}}>
              <h3 style={{margin:'0 0 12px',fontSize:14,fontWeight:700}}>По сотрудникам</h3>
              {Object.entries(mgrStats).sort(([,a],[,b])=>(b.total/b.count)-(a.total/a.count)).map(([id,st])=>{
                const avg=st.total/st.count;
                return <div key={id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:'#f9fafb',borderRadius:10,marginBottom:5,border:'1px solid #e5e7eb'}}>
                  <Badge score={avg}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{st.name}</div>
                    <div style={{fontSize:11,color:'#6b7280',marginTop:1}}>{st.count} анал. • {avg.toFixed(1)} — {sLabel(avg)}</div>
                  </div>
                  <div style={{display:'flex',gap:2,flexWrap:'wrap',justifyContent:'flex-end'}}>
                    {Object.entries(st.crit).map(([cid,cs])=>{const ca=cs.t/cs.n;return<div key={cid} style={{padding:'1px 5px',borderRadius:4,fontSize:9,fontWeight:600,background:sColor(ca)+'14',color:sColor(ca),whiteSpace:'nowrap'}}>{cid}:{ca.toFixed(1)}</div>})}
                  </div>
                </div>})}
            </div>
          </>}
        </>;
      })()}

      {/* ═══ HISTORY TAB ═══ */}
      {tab==='history'&&<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:700}}>Все анализы ({analyses.length})</h3>
          {analyses.length>0&&<button className="btn btn-danger" style={{fontSize:11,padding:'5px 10px'}} onClick={()=>{if(confirm('Очистить?')){setAnalyses([]);localStorage.removeItem(LS)}}}>Очистить</button>}
        </div>
        {!analyses.length?<div style={{textAlign:'center',padding:'50px 20px',color:'#9ca3af'}}><div style={{fontSize:40,marginBottom:8}}>📋</div><div style={{fontSize:14,fontWeight:600,color:'#6b7280'}}>Пусто</div></div>:
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {analyses.map(a=>{const r=typeof a.result==='string'?JSON.parse(a.result):a.result;
            return <div key={a.id} className="card" style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',animation:'fadeIn .3s'}} onClick={()=>setSelAnalysis(a)}>
              <Badge score={r.score}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13}}>{a.managerName}</div>
                <div style={{fontSize:11,color:'#6b7280',marginTop:1}}>{fmtDT(a.callDate)} • {a.type} • {fmtDur(a.duration)}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:10,fontWeight:700,color:sColor(r.score)}}>{sLabel(r.score)}</div>
                <div style={{fontSize:10,color:'#9ca3af',marginTop:1}}>{r.errors?.length||0} ош.</div>
              </div>
              <span style={{color:'#d1d5db',fontSize:13}}>›</span>
            </div>})}
        </div>}
      </>}
    </div>

    {/* Mobile nav */}
    <div className="mobile-nav" style={{display:'none',position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #e5e7eb',zIndex:100,paddingBottom:'env(safe-area-inset-bottom)'}}>
      {mobileNavBtn('calls','📞','Звонки')}
      {mobileNavBtn('batch','⚡','Пакет')}
      {mobileNavBtn('reports','📊','Отчёты')}
      {mobileNavBtn('history','📋','История')}
    </div>

    {selAnalysis&&<AnalysisModal analysis={selAnalysis} onClose={()=>setSelAnalysis(null)} onShowTranscript={t=>setShowTranscript(t)}/>}
    {showTranscript&&<TranscriptModal text={showTranscript} onClose={()=>setShowTranscript(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
// Clear old caches and re-register SW
if('serviceWorker' in navigator){
  window.addEventListener('load',async()=>{
    // Clear all caches first
    if(window.caches){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
